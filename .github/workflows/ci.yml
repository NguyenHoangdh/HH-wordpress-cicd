name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  unit-test:
    name: Unit Test (PHPUnit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer, phpunit
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml
  code-quality:
    name: Static Code Analysis (PHPCS)
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: phpcs
      - name: Create sample PHP file
        run: |
          mkdir -p wp-content/themes/my-theme
          cat > wp-content/themes/my-theme/functions.php << 'EOF'
          <?php
          /**
           * Theme setup class
           *
           * @package MyTheme
           */
          namespace MyTheme;

          /**
           * Class ThemeSetup
           */
          class ThemeSetup
          {
              /**
               * Setup theme features
               *
               * @return void
               */
              public function setup()
              {
                  add_theme_support('title-tag');
                  add_theme_support('post-thumbnails');
              }
          }
          EOF
      - name: Run PHPCS
        run: |
          phpcs --standard=PSR2 \
                --extensions=php \
                --ignore=vendor \
                wp-content/themes/my-theme/functions.php
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hh-wordpress:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hh-wordpress:latest
  e2e-test:
    name: E2E Test (Playwright)
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Playwright
        run: |
          npm ci
          npx playwright install chromium
      - name: Start staging environment
        run: |
          cd D:\wordpress-cicd
          docker compose up -d
          Start-Sleep -Seconds 15
      - name: Run E2E tests
        run: npx playwright test e2e/wordpress.spec.js
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
  deploy-staging:
    name: Deploy Staging
    runs-on: self-hosted
    needs: e2e-test
    steps:
      - name: Deploy Staging
        run: |
	  cd D:\wordpress-cicd
          docker compose pull wordpress
          docker compose up -d --no-deps wordpress
          echo "Staging deployed successfully"
